<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creative OS - Bari Life</title>
<style>
  :root { --bg: #0f1117; --surface: #1a1d27; --border: #2a2d3a; --text: #e4e4e7; --muted: #8b8d97; --accent: #6366f1; --green: #22c55e; --red: #ef4444; --yellow: #eab308; --blue: #3b82f6; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; padding: 2rem; max-width: 1400px; margin: 0 auto; }
  h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: 0.25rem; }
  .subtitle { color: var(--muted); margin-bottom: 2rem; font-size: 0.9rem; }
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; }
  .card-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin-bottom: 0.25rem; }
  .card-value { font-size: 2rem; font-weight: 700; }
  .card-value.green { color: var(--green); }
  .card-value.red { color: var(--red); }
  .card-value.blue { color: var(--blue); }
  .card-value.yellow { color: var(--yellow); }
  .section { margin-bottom: 2rem; }
  .section h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 1rem; color: var(--muted); }
  .chart-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
  .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; }
  .chart-card h3 { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin-bottom: 1rem; }
  .bar-chart { display: flex; flex-direction: column; gap: 0.5rem; }
  .bar-row { display: flex; align-items: center; gap: 0.75rem; }
  .bar-label { font-size: 0.8rem; min-width: 110px; text-align: right; color: var(--muted); }
  .bar-track { flex: 1; height: 24px; background: var(--bg); border-radius: 6px; overflow: hidden; position: relative; }
  .bar-fill { height: 100%; border-radius: 6px; display: flex; align-items: center; padding-left: 8px; font-size: 0.75rem; font-weight: 600; min-width: 28px; transition: width 0.4s ease; }
  .bar-fill.status { background: var(--accent); }
  .bar-fill.classification { background: var(--blue); }
  .bar-fill.format { background: var(--green); }
  .bar-fill.funnel { background: var(--yellow); color: #000; }
  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  thead th { text-align: left; padding: 0.75rem; border-bottom: 2px solid var(--border); color: var(--muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; position: sticky; top: 0; background: var(--surface); }
  tbody td { padding: 0.75rem; border-bottom: 1px solid var(--border); }
  tbody tr:hover { background: rgba(99,102,241,0.05); }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; }
  .badge-draft { background: #374151; color: #9ca3af; }
  .badge-in_review { background: #1e3a5f; color: #60a5fa; }
  .badge-approved { background: #14532d; color: #4ade80; }
  .badge-live { background: #166534; color: #22c55e; }
  .badge-paused { background: #422006; color: #fbbf24; }
  .badge-killed { background: #450a0a; color: #f87171; }
  .badge-winner { background: #14532d; color: #4ade80; }
  .badge-near_winner { background: #1e3a5f; color: #60a5fa; }
  .badge-loser { background: #450a0a; color: #f87171; }
  .badge-unvalidated { background: #374151; color: #9ca3af; }
  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow-x: auto; }
  .filters { display: flex; gap: 0.75rem; margin-bottom: 1rem; flex-wrap: wrap; }
  .filters select, .filters input[type="date"] { background: var(--surface); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 0.4rem 0.6rem; font-size: 0.8rem; }
  .filters label { font-size: 0.75rem; color: var(--muted); display: flex; align-items: center; gap: 0.35rem; }
  .date-range { display: flex; align-items: center; gap: 0.5rem; }
  .empty { text-align: center; padding: 3rem; color: var(--muted); }
  .timestamp { font-size: 0.75rem; color: var(--muted); }
  #loading { text-align: center; padding: 4rem; color: var(--muted); font-size: 1.1rem; }
</style>
</head>
<body>

<h1>Creative OS</h1>
<p class="subtitle">Bari Life Creative Assembly Line &mdash; <span id="timestamp"></span></p>

<div id="loading">Loading data...</div>
<div id="app" style="display:none">

<div class="cards" id="summary-cards"></div>

<div class="chart-row" id="charts"></div>

<div class="section">
  <h2>All Creatives</h2>
  <div class="filters" id="filters"></div>
  <div class="table-wrap">
    <table>
      <thead id="table-head"></thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>
</div>

</div>

<script type="application/json" id="report-data">__REPORT_DATA__</script>

<script>
async function loadData() {
  const el = document.getElementById('report-data');
  const raw = el ? el.textContent.trim() : '';
  if (raw && !raw.startsWith('__')) {
    return JSON.parse(raw);
  }
  // Live mode: fetch from API
  const [exportRes] = await Promise.all([fetch('/api/export')]);
  return exportRes.json();
}

function fmt(n, dec = 2) {
  if (n == null) return '-';
  return Number(n).toLocaleString(undefined, { minimumFractionDigits: dec, maximumFractionDigits: dec });
}
function fmtMoney(n) { return n == null ? '-' : '$' + fmt(n); }
function fmtPct(n) { return n == null ? '-' : (n * 100).toFixed(1) + '%'; }

function renderSummary(data) {
  const s = data.summary;
  const winners = (data.by_classification || []).find(c => c.classification === 'winner');
  const live = (data.by_status || []).find(c => c.status === 'live');
  const killed = (data.by_status || []).find(c => c.status === 'killed');
  document.getElementById('summary-cards').innerHTML = `
    <div class="card"><div class="card-label">Total Creatives</div><div class="card-value">${s.count || 0}</div></div>
    <div class="card"><div class="card-label">Total Spend</div><div class="card-value blue">${fmtMoney(s.total_spend)}</div></div>
    <div class="card"><div class="card-label">Avg CPA</div><div class="card-value yellow">${fmtMoney(s.avg_cpa)}</div></div>
    <div class="card"><div class="card-label">Live</div><div class="card-value green">${live ? live.count : 0}</div></div>
    <div class="card"><div class="card-label">Winners</div><div class="card-value green">${winners ? winners.count : 0}</div></div>
    <div class="card"><div class="card-label">Killed</div><div class="card-value red">${killed ? killed.count : 0}</div></div>
  `;
}

function renderBarChart(title, items, labelKey, cssClass) {
  if (!items || items.length === 0) return '';
  const max = Math.max(...items.map(i => i.count));
  const bars = items.map(i => `
    <div class="bar-row">
      <div class="bar-label">${i[labelKey] || 'null'}</div>
      <div class="bar-track"><div class="bar-fill ${cssClass}" style="width:${Math.max((i.count/max)*100, 8)}%">${i.count}</div></div>
    </div>
  `).join('');
  return `<div class="chart-card"><h3>${title}</h3><div class="bar-chart">${bars}</div></div>`;
}

function renderCharts(data) {
  document.getElementById('charts').innerHTML =
    renderBarChart('By Status', data.by_status, 'status', 'status') +
    renderBarChart('By Classification', data.by_classification, 'classification', 'classification') +
    renderBarChart('By Format', data.by_format, 'format', 'format') +
    renderBarChart('By Funnel Stage', data.by_funnel_stage, 'funnel_stage', 'funnel');
}

let allCreatives = [];
let currentFilters = {};

function renderFilters(data) {
  const statuses = [...new Set(data.creatives.map(c => c.status).filter(Boolean))];
  const classifications = [...new Set(data.creatives.map(c => c.classification).filter(Boolean))];
  const formats = [...new Set(data.creatives.map(c => c.format).filter(Boolean))];
  const funnels = [...new Set(data.creatives.map(c => c.funnel_stage).filter(Boolean))];

  function makeSelect(name, options) {
    return `<select data-filter="${name}"><option value="">All ${name}</option>${options.map(o => `<option value="${o}">${o}</option>`).join('')}</select>`;
  }

  // Get date range from data
  const dates = data.creatives.map(c => c.date_created).filter(Boolean).sort();
  const minDate = dates[0] || '';
  const maxDate = dates[dates.length - 1] || '';

  document.getElementById('filters').innerHTML =
    makeSelect('status', statuses) +
    makeSelect('classification', classifications) +
    makeSelect('format', formats) +
    makeSelect('funnel_stage', funnels) +
    `<div class="date-range">
      <label>From <input type="date" id="date-from" value="${minDate}" data-filter="date_from"></label>
      <label>To <input type="date" id="date-to" value="${maxDate}" data-filter="date_to"></label>
    </div>`;

  document.querySelectorAll('#filters select').forEach(sel => {
    sel.addEventListener('change', () => {
      currentFilters[sel.dataset.filter] = sel.value;
      renderTable();
    });
  });

  document.querySelectorAll('#filters input[type="date"]').forEach(inp => {
    inp.addEventListener('change', () => {
      currentFilters[inp.dataset.filter] = inp.value;
      renderTable();
    });
  });
}

function renderTable() {
  const cols = [
    { key: 'ad_name', label: 'Ad ID' },
    { key: 'persona', label: 'Persona' },
    { key: 'funnel_stage', label: 'Funnel' },
    { key: 'format', label: 'Format' },
    { key: 'status', label: 'Status', badge: true },
    { key: 'classification', label: 'Class.', badge: true },
    { key: 'hook_type', label: 'Hook Type' },
    { key: 'offer', label: 'Offer' },
    { key: 'spend', label: 'Spend', fmt: fmtMoney },
    { key: 'cpa', label: 'CPA', fmt: fmtMoney },
    { key: 'ctr', label: 'CTR', fmt: fmtPct },
    { key: 'date_created', label: 'Created' },
    { key: 'week_number', label: 'Week' },
    { key: 'created_by', label: 'Created By' },
  ];

  document.getElementById('table-head').innerHTML = '<tr>' + cols.map(c => `<th>${c.label}</th>`).join('') + '</tr>';

  let filtered = allCreatives;
  for (const [k, v] of Object.entries(currentFilters)) {
    if (!v) continue;
    if (k === 'date_from') { filtered = filtered.filter(c => c.date_created >= v); continue; }
    if (k === 'date_to') { filtered = filtered.filter(c => c.date_created <= v); continue; }
    filtered = filtered.filter(c => c[k] === v);
  }

  if (filtered.length === 0) {
    document.getElementById('table-body').innerHTML = '<tr><td colspan="' + cols.length + '" class="empty">No creatives found</td></tr>';
    return;
  }

  document.getElementById('table-body').innerHTML = filtered.map(c => '<tr>' + cols.map(col => {
    const val = c[col.key];
    if (col.badge && val) return `<td><span class="badge badge-${val}">${val}</span></td>`;
    if (col.fmt) return `<td>${col.fmt(val)}</td>`;
    return `<td>${val != null ? val : '-'}</td>`;
  }).join('') + '</tr>').join('');
}

async function main() {
  try {
    const data = await loadData();
    allCreatives = data.creatives || [];
    document.getElementById('timestamp').textContent = data.exported_at ? new Date(data.exported_at).toLocaleString() : new Date().toLocaleString();
    renderSummary(data);
    renderCharts(data);
    renderFilters(data);
    renderTable();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'block';
  } catch (err) {
    document.getElementById('loading').textContent = 'No data yet. Add creatives via the API to see the dashboard.';
  }
}

main();
</script>
</body>
</html>
